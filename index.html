<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Energy Bunk</title>

  <!-- Internal CSS for simplicity -->
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      min-height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #333;
    }

    .container {
      background: #ffffff;
      width: 360px;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #2a5298;
    }

    .section-title {
      font-weight: bold;
      margin-bottom: 10px;
    }

    .options label {
      display: block;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 6px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: background 0.3s, border 0.3s;
    }

    .options input {
      margin-right: 8px;
    }

    .options label:hover {
      background: #f0f6ff;
      border-color: #2a5298;
    }

    input[type="number"],
    input[type="text"] {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      margin-bottom: 15px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #2a5298;
      border: none;
      border-radius: 6px;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background: #1e3c72;
    }

    #status {
      margin-top: 15px;
      text-align: center;
      font-weight: bold;
    }

    .success {
      color: green;
    }

    .error {
      color: red;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Smart Energy Bunk</h2>

    <div class="section-title">Select Energy Type</div>
    <div class="options">
      <label>
        <input type="radio" name="energy" value="Petrol"> Petrol
      </label>
      <label>
        <input type="radio" name="energy" value="Diesel"> Diesel
      </label>
      <label>
        <input type="radio" name="energy" value="Air"> Air Pump
      </label>
      <label>
        <input type="radio" name="energy" value="Wireless"> Wireless Charging
      </label>
    </div>

    <div class="section-title">Amount (₹)</div>
    <input type="number" id="amount" placeholder="Enter amount">

    <div class="section-title">OTP</div>
    <input type="text" id="otp" placeholder="Enter OTP">

    <button onclick="submitData()">Submit</button>

    <p id="status"></p>
  </div>

  <!-- JavaScript -->
  <script>
    function submitData() {
      const energy = document.querySelector('input[name="energy"]:checked');
      const amount = document.getElementById("amount").value;
      const otp = document.getElementById("otp").value;
      const status = document.getElementById("status");

      // Validation
      if (!energy) {
        status.textContent = "Please select an energy type.";
        status.className = "error";
        return;
      }

      if (amount === "" || amount <= 0) {
        status.textContent = "Please enter a valid amount.";
        status.className = "error";
        return;
      }

      if (otp.length < 4) {
        status.textContent = "Invalid OTP.";
        status.className = "error";
        return;
      }

      // Data object (ready for Firebase / Sheets / API)
      const data = {
        energy: energy.value,
        amount: amount,
        otp: otp,
        status: "PAYMENT_SUCCESS",
        timestamp: new Date().toLocaleString()
      };

      console.log("Submitted Data:", data);

      // Success message
      status.textContent = "Payment verified. Energy delivery initiated.";
      status.className = "success";

      // 🔗 HERE is where you:
      // - send data to Firebase
      // - update Google Sheets
      // - trigger ESP32 logic
    }
  </script>

</body>
</html>
