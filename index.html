<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Energy Bunk</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #1e3c72, #2a5298);
  min-height: 100vh;
  margin: 0;
  display: flex;
  justify-content: center;
  align-items: center;
}
.container {
  background: white;
  width: 380px;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.25);
}
h2 {
  text-align: center;
  color: #2a5298;
}
label {
  font-weight: bold;
}
input, select, button {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  margin-bottom: 15px;
  border-radius: 6px;
  border: 1px solid #ccc;
}
button {
  background: #2a5298;
  color: white;
  border: none;
  cursor: pointer;
}
button:hover {
  background: #1e3c72;
}
#status {
  text-align: center;
  font-weight: bold;
}
.success { color: green; }
.error { color: red; }
</style>
</head>

<body>

<div class="container">
  <h2>Smart Energy Bunk</h2>

  <label>Phone Number</label>
  <input type="text" id="phone">

  <label>Energy Type</label>
  <select id="energy">
    <option value="">Select</option>
    <option value="petrol">Petrol</option>
    <option value="diesel">Diesel</option>
    <option value="air">Air Pump</option>
    <option value="wireless">Wireless Charging</option>
  </select>

  <label>Amount (₹)</label>
  <input type="number" id="amount">

  <label>Quantity</label>
  <input type="number" id="quantity">

  <button onclick="payNow()">Pay & Generate OTP</button>

  <label>Enter OTP</label>
  <input type="text" id="otpInput">

  <button onclick="verifyOTP()">Confirm & Start</button>

  <p id="status"></p>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
// 🔥 Firebase Initialization
const firebaseConfig = {
  apiKey: "AIzaSyDjiZo_lbuG7M0ndiKIS2fWynWGH-aB4tA",
  authDomain: "automated-multi-energy-s-210bd.firebaseapp.com",
  databaseURL: "https://automated-multi-energy-s-210bd-default-rtdb.firebaseio.com",
  projectId: "automated-multi-energy-s-210bd",
  storageBucket: "automated-multi-energy-s-210bd.firebasestorage.app",
  messagingSenderId: "995922510546",
  appId: "1:995922510546:web:f296db21e84d693c59230b"
};

firebase.initializeApp(firebaseConfig);
const database = firebase.database();

let generatedOTP = "";
let currentTxnId = "";

// 🔹 PAYMENT + OTP GENERATION
function payNow() {
  const phone = document.getElementById("phone").value;
  const energy = document.getElementById("energy").value;
  const amount = document.getElementById("amount").value;
  const quantity = document.getElementById("quantity").value;
  const status = document.getElementById("status");

  if (!phone || !energy || !amount || !quantity) {
    status.textContent = "Fill all details";
    status.className = "error";
    return;
  }

  generatedOTP = Math.floor(1000 + Math.random() * 9000).toString();
  currentTxnId = "TXN_" + Date.now();

  database.ref("transactions/" + currentTxnId).set({
    phone: phone,
    energy: energy,
    amount: amount,
    quantity: quantity,
    otp: generatedOTP,
    paymentStatus: "SUCCESS",
    energyStatus: "PENDING",
    timestamp: new Date().toISOString()
  });

  status.textContent = "Payment successful. OTP generated.";
  status.className = "success";

  // For demo purpose only
  alert("OTP: " + generatedOTP);
}

// 🔹 OTP VERIFICATION
function verifyOTP() {
  const enteredOTP = document.getElementById("otpInput").value;
  const status = document.getElementById("status");

  if (enteredOTP !== generatedOTP) {
    status.textContent = "Invalid OTP";
    status.className = "error";
    return;
  }

  database.ref("transactions/" + currentTxnId + "/energyStatus")
    .set("ENABLED");

  status.textContent = "OTP verified. Energy enabled.";
  status.className = "success";
}
</script>

</body>
</html>
